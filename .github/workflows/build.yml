name: Build & Release APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Download Gradle wrapper JAR
        run: |
          mkdir -p gradle/wrapper
          curl -L -o gradle/wrapper/gradle-wrapper.jar \
            https://github.com/gradle/gradle/raw/v8.2.0/gradle/wrapper/gradle-wrapper.jar

      - name: Build Debug APK
        run: |
          unset _JAVA_OPTIONS
          ./gradlew assembleDebug --no-daemon

      - name: Copy APK to release folder
        run: |
          mkdir -p release
          cp app/build/outputs/apk/debug/app-debug.apk release/OSRS-Bot-v2.apk

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: OSRS-Bot-v2-APK
          path: release/OSRS-Bot-v2.apk
          retention-days: 90

      - name: Delete old latest release
        run: gh release delete latest --yes || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release with APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: 'OSRS Bot v2.0 - Download APK Here'
          body: |
            ## Tap the .apk file below to download and test on your phone

            ### Install steps
            1. Tap OSRS-Bot-v2.apk below
            2. Android: Settings -> Security -> Allow unknown sources
            3. Install the APK, open OSRS Bot
            4. Grant Overlay + Accessibility permissions
            5. Pick your script, tap Launch Floating Overlay
            6. Switch to OSRS, tap TARGET to mark trees/spots/monsters, then START

            ### v2.0 changes
            - ObjectDetector v2: 80+ keywords, confidence scoring, deduplication, caching
            - Level-aware timing for WC/Fishing/Combat
            - Axe-type awareness (dragon/rune axe = faster chops)
            - Gaussian click offsets for natural-looking clicks
            - All scripts: miss-streak recovery and stuck detection
            - Combat: priority monster list and eating state
          files: release/OSRS-Bot-v2.apk
          draft: false
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
