name: Build & Release APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.2'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Build Debug APK
        run: gradle assembleDebug --no-daemon --stacktrace
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}

      - name: Rename APK
        run: |
          mkdir -p release
          cp app/build/outputs/apk/debug/app-debug.apk release/OSRS-Bot-v2.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: OSRS-Bot-v2-APK
          path: release/OSRS-Bot-v2.apk
          retention-days: 90

      - name: Delete old release if exists
        run: |
          gh release delete latest --yes || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release with APK download
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "⬇️ OSRS Bot v2.0 — Download APK Here"
          body: |
            ## ✅ Download the APK below — tap the .apk file

            > Built automatically from the latest source code.

            ---

            ### 📱 How to install on your phone
            1. Tap **`OSRS-Bot-v2.apk`** below to download
            2. On Android: Settings → Security → **Allow unknown sources** (or "Install unknown apps")
            3. Open the downloaded file and tap Install
            4. Open **OSRS Bot** app
            5. Tap **Grant Permissions** and allow everything
            6. Tap **Open Accessibility Settings** → find OSRS Bot → toggle ON
            7. Pick your script → tap **Launch Floating Overlay**
            8. Switch to OSRS — the floating panel appears on top
            9. Tap **🎯 SELECT TARGETS** → tap on trees/rocks/items in the game
            10. Tap **✓ DONE** → tap **▶** to start the bot

            ---

            ### 🆕 What's in v2.0
            | Feature | Details |
            |---|---|
            | 🎯 Target Selector | Tap on trees/rocks directly to teach the bot what to click |
            | 🐛 Overlay fix | All overlay buttons now work (start, stop, select) |
            | 🍫 Chocolate Dust Maker | ~180K GP/hr moneymaker (knife + chocolate bar) |
            | 🌲 Woodcutting | Auto chop trees, bank logs |
            | 🎣 Fishing | Auto fish, bank catches |
            | ⚔️ Combat | Auto fight monsters, loot drops |
            | 🛡️ Antiban | Random breaks, auto-stop by time/actions, fatigue simulation |
          files: release/OSRS-Bot-v2.apk
          draft: false
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
