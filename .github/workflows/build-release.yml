name: Build & Release APK

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - run: chmod +x gradlew
      - run: ./gradlew assembleRelease --no-daemon
      - name: Sign APK
        run: |
          BUILD_TOOLS=$(ls $ANDROID_HOME/build-tools | sort -V | tail -1)
          $ANDROID_HOME/build-tools/$BUILD_TOOLS/apksigner sign \
            --ks-pass pass:android --key-pass pass:android \
            --ks ~/.android/debug.keystore \
            --out app/build/outputs/apk/release/osrsbot-signed.apk \
            app/build/outputs/apk/release/app-release-unsigned.apk || \
          cp app/build/outputs/apk/release/app-release-unsigned.apk \
             app/build/outputs/apk/release/osrsbot-signed.apk
      - uses: softprops/action-gh-release@v2
        with:
          name: "OSRS Bot ${{ github.ref_name }}"
          body: |
            ## OSRS Auto Trainer Bot - ${{ github.ref_name }}
            ### Fixes in v3.0
            - Fixed ObjectDetector constructor mismatch (compile error)
            - Fixed detector.pixelDetector missing property (compile error)
            - Fixed WoodcuttingScript NPE crash on InventoryDetector init
            - Nullable capture guard across all 5 scripts
            - Added Mining script to UI (was missing from MainActivity + layout)
            - Fixed BotConfig / OverlayManager indentation
            ### Install
            1. Download osrsbot-signed.apk
            2. Enable Unknown Sources on your Android device
            3. Install and grant Overlay + Accessibility permissions
          files: app/build/outputs/apk/release/osrsbot-signed.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
