name: Build & Release APK

  on:
    push:
      branches: [ main ]
    workflow_dispatch:
      inputs:
        version_tag:
          description: 'Release tag (e.g. v2.1)'
          required: false
          default: 'v2.0-test'

  jobs:
    build:
      name: Build Debug APK
      runs-on: ubuntu-latest

      steps:
        - name: Checkout code
          uses: actions/checkout@v4

        - name: Set up JDK 17
          uses: actions/setup-java@v4
          with:
            java-version: '17'
            distribution: 'temurin'
            cache: gradle

        - name: Grant execute permission to gradlew
          run: chmod +x gradlew

        - name: Build Debug APK
          run: ./gradlew assembleDebug --no-daemon

        - name: Get version name
          id: version
          run: |
            VERSION=$(grep versionName app/build.gradle | head -1 | tr -d ' "' | cut -d= -f2)
            TAG=${{ github.event.inputs.version_tag || format('v{0}-debug', env.VERSION) }}
            echo "tag=v${VERSION}-debug" >> $GITHUB_OUTPUT
            echo "apk_path=app/build/outputs/apk/debug/app-debug.apk" >> $GITHUB_OUTPUT

        - name: Rename APK
          run: |
            mv app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/osrs-bot-v2.0-debug.apk

        - name: Create GitHub Release
          id: create_release
          uses: softprops/action-gh-release@v2
          with:
            tag_name: ${{ steps.version.outputs.tag }}
            name: "OSRS Bot ${{ steps.version.outputs.tag }}"
            body: |
              ## OSRS Auto Trainer Bot — Debug Build

              ### What's new in v2.0
              - **ObjectDetector v2** — 80+ keywords, confidence scoring, deduplication, 800ms cache
              - **Level-aware timing** — set your WC/Fishing/Combat level for accurate wait times
              - **Axe-type awareness** — dragon/rune axe = faster chops than bronze/iron
              - **Gaussian click offsets** — more natural-looking clicks
              - **All scripts** — miss-streak recovery, cache invalidation on stuck, priority monster targeting
              - **Combat Bot** — priority monster list (goblin → cow → imp → …) + eating state fixed
              - **Mining Bot** — new script added

              ### Installation
              1. Download `osrs-bot-v2.0-debug.apk`
              2. Enable **Install from unknown sources** on your Android device
              3. Install the APK
              4. Grant **Overlay** and **Accessibility** permissions
              5. Open OSRS Bot → select your script → tap **Launch Floating Overlay**

              ### Setup tips
              - Set your **skill levels** in settings for smarter timing
              - Select your **axe type** if using woodcutting
              - Use the 🎯 **Target** button on the overlay to mark trees/spots/monsters
            draft: false
            prerelease: false
            files: app/build/outputs/apk/debug/osrs-bot-v2.0-debug.apk
          env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  